name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m venv .venv && .venv/bin/pip install ruff
      - run: .venv/bin/ruff check src/ --ignore=E501
      - run: .venv/bin/ruff format --check src/

  test:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: DEBUG probe env
        run: |
          echo "PATH=$PATH"
          echo "HOME=$HOME"
          which cargo || echo "cargo NOT FOUND"
          which python3 || echo "python3 NOT FOUND"
      - name: setup python on self-hosted
        if: runner.environment == 'self-hosted'
        run: echo "PYBIN=python${{ matrix.python-version }}" >> $GITHUB_ENV
      - name: setup python on hosted
        if: runner.environment != 'self-hosted'
        run: echo "PYBIN=python" >> $GITHUB_ENV
      - run: $PYBIN -m venv .venv && .venv/bin/pip install -e ".[dev]"
        shell: bash
      - run: .venv/bin/pytest tests/ -q --tb=short
        shell: bash

  typecheck:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m venv .venv && .venv/bin/pip install -e ".[dev]" pyright
      - run: |
          .venv/bin/pyright src/ --pythonversion 3.11 2>/dev/null || true

  build:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m venv .venv && .venv/bin/pip install build
      - run: .venv/bin/python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  security:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m venv .venv && .venv/bin/pip install pip-audit
      - run: .venv/bin/pip-audit || .venv/bin/pip-audit --strict --require-hashes