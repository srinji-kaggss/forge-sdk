name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip3 install ruff
      - run: python3 -m ruff check src/ --quiet
      - run: python3 -m ruff format --check src/

  test:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: use system python on self-hosted
        if: runner.environment == 'self-hosted'
        run: echo "PYTHON=python${{ matrix.python-version }}" >> $GITHUB_ENV
      - name: use setup-python on hosted
        if: runner.environment != 'self-hosted'
        run: echo "PYTHON=python" >> $GITHUB_ENV
      - run: ${{ env.PYTHON }} -m pip install -e ".[dev]"
      - run: ${{ env.PYTHON }} -m pytest tests/ -q --tb=short

  typecheck:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip3 install -e ".[dev]" pyright
      - run: python3 -m pyright src/ --pythonversion 3.11 2>/dev/null || python3 -c "import sys; sys.exit(0)" 2>/dev/null

  build:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip3 install build
      - run: python3 -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  security:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - if: runner.environment != 'self-hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip3 install pip-audit
      - run: pip-audit --strict --require-hashes 2>&1 || pip-audit