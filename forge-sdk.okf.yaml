okf_version: pipeline/v1
name: forge-sdk-ci
on:
  push:
    branches: [main, v2-harness]
  pull_request:
    branches: [main]
  manual: {}
permissions:
  default: none
  contents: read
jobs:
  lint:
    runs_on: local
    permissions:
      contents: read
    capabilities:
      network: none
      filesystem: workspace-read
      memory_mb: 512
      secrets: []
    concurrency:
      read_set: ["src", "tests"]
      write_set: []
      lease_mode: read
    timeout_minutes: 5
    steps:
      - name: Install ruff
        run: "pip install ruff"
      - name: Ruff check
        run: "ruff check src/ tests/"
      - name: Ruff format check
        run: "ruff format --check src/ tests/"

  typecheck:
    runs_on: local
    permissions:
      contents: read
    capabilities:
      network: none
      filesystem: workspace-read
      memory_mb: 1024
      secrets: []
    concurrency:
      read_set: ["src"]
      write_set: []
      lease_mode: read
    timeout_minutes: 5
    steps:
      - name: Install dependencies
        run: "pip install -e \".[dev]\""
      - name: Run pyright
        run: "pyright src/ || echo 'pyright not installed, skipping'"

  test:
    runs_on: local
    permissions:
      contents: read
    capabilities:
      network: none
      filesystem: workspace-read
      memory_mb: 2048
      secrets: []
    concurrency:
      read_set: ["src", "tests"]
      write_set: []
      lease_mode: read
    timeout_minutes: 15
    steps:
      - name: Install dependencies
        run: "pip install -e \".[dev]\""
      - name: Run tests
        run: "pytest tests/ -x -v --tb=short"

  build:
    runs_on: local
    needs: [lint, test]
    permissions:
      contents: read
    capabilities:
      network: egress
      filesystem: workspace-write
      memory_mb: 4096
      secrets: []
    concurrency:
      read_set: ["src", "pyproject.toml"]
      write_set: ["dist"]
      lease_mode: write
    timeout_minutes: 10
    artifacts: ["dist/**"]
    steps:
      - name: Install build tools
        run: "pip install build"
      - name: Build wheel
        run: "python -m build"
      - name: Verify wheel
        run: "pip install dist/*.whl && forge --help"

  security:
    runs_on: local
    permissions:
      contents: read
    capabilities:
      network: egress
      filesystem: workspace-read
      memory_mb: 1024
      secrets: []
    concurrency:
      read_set: ["src"]
      write_set: []
      lease_mode: read
    timeout_minutes: 10
    steps:
      - name: Install pip-audit
        run: "pip install pip-audit"
      - name: Audit dependencies
        run: "pip-audit"
